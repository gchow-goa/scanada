<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanada — Jurisdictional Scan Copilot</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      background: #f4f6f9;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .scanada-header {
      background: #003366;
      color: #ffffff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .scanada-header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .scanada-header p {
      margin: 3px 0 0;
      font-size: 0.82rem;
      opacity: 0.8;
    }
    #n8n-chat {
      height: calc(100vh - 72px);
      width: 100%;
    }
    .chat-header {
      display: none !important;
    }
    /* Input row container */
    [class*="chat-input"],
    [class*="chat-inputs"],
    [class*="input-wrapper"],
    [class*="chat-footer"] {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box !important;
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important;
    }
    /* Text input grows to fill all available space */
    #n8n-chat textarea,
    #n8n-chat input[type="text"] {
      flex: 1 1 auto !important;
      width: 0 !important;
      min-width: 0 !important;
      max-width: none !important;
      box-sizing: border-box !important;
    }
    /* Submit button stays a fixed small width */
    #n8n-chat button[type="submit"],
    #n8n-chat button[class*="send"],
    #n8n-chat button[class*="submit"] {
      flex: 0 0 48px !important;
      width: 48px !important;
      min-width: 48px !important;
      max-width: 48px !important;
    }
    .chat-message-markdown p {
      margin: 0 0 4px 0;
    }
    :root {
      --chat--color-primary: #003366;
      --chat--color-primary-shade-50: #002244;
      --chat--color-secondary: #0055a5;
      --chat--color-background: #ffffff;
      --chat--color-font: #1a1a2e;
      --chat--message--bot--background: #eaf1fb;
      --chat--message--user--background: #003366;
      --chat--message--user--color: #ffffff;
      --chat--message--font-size: 0.95rem;
      --chat--input--background: #f9fafb;
      --chat--header--background: #003366;
      --chat--header--color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="scanada-header">
    <div>
      <h1>🍁 Scanada</h1>
      <p>Official-Source Jurisdictional Scan Copilot — Government of Alberta</p>
    </div>
  </div>

  <div id="n8n-chat"></div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://govab.app.n8n.cloud/webhook/1bbc3c5c-cb72-4b22-b04b-afe0b075b279/chat',
      target: '#n8n-chat',
      mode: 'fullscreen',
      showWelcomeScreen: true,
      initialMessages: [
        "Hi — I'm Scanada, your jurisdictional scan copilot.",
        "Paste your research question below to get started.\n✅ Required: Research question\n🔲 Optional: Jurisdictions (default: all 14 — provinces, territories + federal)\n🔲 Optional: Time range (default: most recently available)\n🔲 Optional: Keywords, exclusions",
        "Example:\n\"Scan all PT from 2021-04 to 2026-02: What progress has each province and territory made in creating new regulated childcare spaces, with particular attention to K–12 school settings and CWELCC funding? Keywords: CWELCC, space creation, capital funding. Exclude: home child care, unregulated care.\"",
        "All scans produce a full structured report from official government sources only."
      ],
      i18n: {
        en: {
          title: 'Scanada',
          subtitle: 'Official-Source Jurisdictional Scans',
          inputPlaceholder: 'Describe your research question…',
          getStarted: 'Start Scan',
        }
      }
    });

    function fixInputWidth() {
      // Input grows, button stays fixed
      document.querySelectorAll(
        '#n8n-chat textarea, #n8n-chat input[type="text"]'
      ).forEach(el => {
        el.style.setProperty('flex', '1 1 auto', 'important');
        el.style.setProperty('width', '0', 'important');
        el.style.setProperty('min-width', '0', 'important');
        el.style.setProperty('max-width', 'none', 'important');
        el.style.setProperty('box-sizing', 'border-box', 'important');
      });
      document.querySelectorAll(
        '#n8n-chat button[type="submit"], #n8n-chat button'
      ).forEach(el => {
        el.style.setProperty('flex', '0 0 48px', 'important');
        el.style.setProperty('width', '48px', 'important');
        el.style.setProperty('min-width', '48px', 'important');
        el.style.setProperty('max-width', '48px', 'important');
      });
      document.querySelectorAll(
        '[class*="chat-input"], [class*="chat-inputs"], [class*="input-wrapper"], [class*="chat-footer"]'
      ).forEach(el => {
        el.style.setProperty('display', 'flex', 'important');
        el.style.setProperty('flex-direction', 'row', 'important');
        el.style.setProperty('width', '100%', 'important');
        el.style.setProperty('max-width', '100%', 'important');
        el.style.setProperty('box-sizing', 'border-box', 'important');
      });
    }

    setTimeout(fixInputWidth, 500);
    setTimeout(fixInputWidth, 1500);
    new MutationObserver(fixInputWidth).observe(
      document.getElementById('n8n-chat'),
      { childList: true, subtree: true }
    );
  </script>

</body>
</html>
