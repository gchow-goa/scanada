<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Scanada — Official-source jurisdictional scan tool for the Government of Alberta" />
  <title>Scanada — Jurisdictional Scan Copilot</title>

  <!-- Favicon: Alberta maple leaf in government navy -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23002855'/><text y='.9em' font-size='72' x='50%' dominant-baseline='top' text-anchor='middle' transform='translate(0,8)'>🍁</text></svg>" />

  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      font-family: 'Source Sans 3', 'Segoe UI', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .scanada-header {
      background: #002855;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
      color: #ffffff;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      border-bottom: 3px solid #c9a84c;
    }

    .scanada-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
      pointer-events: none;
    }

    .scanada-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: rgba(201, 168, 76, 0.18);
      border: 1.5px solid rgba(201, 168, 76, 0.5);
      border-radius: 6px;
      font-size: 1.25rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .scanada-header-text h1 {
      margin: 0;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      line-height: 1.2;
      color: #ffffff;
    }

    .scanada-header-text p {
      margin: 3px 0 0;
      font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.2px;
    }

    .scanada-header-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .scanada-pill {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    /* ── Chat container ──────────────────────────────────────────── */
    #n8n-chat {
      height: calc(100vh - 64px);
    }

    .chat-header {
      display: none !important;
    }

    /* ── n8n Chat CSS variables ──────────────────────────────────── */
    :root {
      --chat--color-primary:             #002855;
      --chat--color-primary-shade-50:    #001e42;
      --chat--color-secondary:           #0055a5;
      --chat--color-background:          #ffffff;
      --chat--color-font:                #1a1e2e;
      --chat--message--bot--background:  #f5f7fa;
      --chat--message--bot--color:       #1a1e2e;
      --chat--message--user--background: #002855;
      --chat--message--user--color:      #ffffff;
      --chat--message--font-size:        0.94rem;
      --chat--message--line-height:      1.65;
      --chat--input--background:         #f8f9fb;
      --chat--input--border-color:       #d5dbe8;
      --chat--header--background:        #002855;
      --chat--header--color:             #ffffff;
      --chat--typing--color:             #002855;
    }

    /* ── Mobile: tighten header at narrow viewports ──────────────── */
    @media (max-width: 600px) {
      .scanada-header {
        padding: 0 16px;
        gap: 12px;
      }

      /* Hide the right-side pill — title + subtitle are enough at small size */
      .scanada-header-meta {
        display: none;
      }

      .scanada-header-text h1 {
        font-size: 1.1rem;
      }

      .scanada-header-text p {
        display: none;
      }
    }

    @media (max-width: 400px) {
      .scanada-badge {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="scanada-header">
    <div class="scanada-badge">🍁</div>
    <div class="scanada-header-text">
      <h1>Scanada</h1>
      <p>Jurisdictional Scan Copilot</p>
    </div>
    <div class="scanada-header-meta">
      <span class="scanada-pill">Government of Alberta</span>
    </div>
  </div>

  <div id="n8n-chat"></div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://govab.app.n8n.cloud/webhook/1bbc3c5c-cb72-4b22-b04b-afe0b075b279/chat',
      target: '#n8n-chat',
      mode: 'fullscreen',
      showWelcomeScreen: true,
      initialMessages: [
        "Hi — I'm Scanada, your jurisdictional scan copilot.",
        "Paste your research question below to get started.\n✅ Required: Research question\n🔲 Optional: Jurisdictions (default: all 14 — provinces, territories + federal)\n🔲 Optional: Time range (default: most recently available)\n🔲 Optional: Keywords, exclusions",
        "Example:\n\"Scan all PT from 2021-04 to 2026-02: What progress has each province and territory made in creating new regulated childcare spaces, with particular attention to K–12 school settings and CWELCC funding? Keywords: CWELCC, space creation, capital funding. Exclude: home child care, unregulated care.\"",
        "All scans produce a full structured report from official government sources only."
      ],
      i18n: {
        en: {
          title: 'Scanada',
          subtitle: 'Official-Source Jurisdictional Scans',
          inputPlaceholder: 'Describe your research question…',
          getStarted: 'Start Scan',
        }
      }
    });
  </script>

  <script>
    // Ensure fonts are loaded before any dynamic button text renders in Source Sans 3
    document.fonts.ready.then(() => {
      const FOOTER_MARKER = 'Copy the full report using the button below';
      const chatContainer = document.getElementById('n8n-chat');

      const observer = new MutationObserver(() => {
        document.querySelectorAll('.chat-message.chat-message-from-bot').forEach(msg => {
          if (msg.querySelector('.scanada-copy-btn')) return;
          if (!msg.innerText.includes(FOOTER_MARKER)) return;

          const btn = document.createElement('button');
          btn.className = 'scanada-copy-btn';
          btn.textContent = 'Copy Report';

          Object.assign(btn.style, {
            marginTop:     '10px',
            padding:       '7px 18px',
            fontSize:      '0.8rem',
            fontFamily:    "'Source Sans 3', 'Segoe UI', sans-serif",
            fontWeight:    '600',
            letterSpacing: '0.4px',
            cursor:        'pointer',
            border:        '1.5px solid #002855',
            background:    '#ffffff',
            color:         '#002855',
            borderRadius:  '5px',
            display:       'inline-block',
            transition:    'background 0.15s, color 0.15s',
            lineHeight:    '1',
          });

          btn.addEventListener('mouseenter', () => {
            btn.style.background = '#002855';
            btn.style.color      = '#ffffff';
          });
          btn.addEventListener('mouseleave', () => {
            btn.style.background = '#ffffff';
            btn.style.color      = '#002855';
          });

          btn.addEventListener('click', () => {
            const full = msg.innerText;
            const cutIdx = full.indexOf(FOOTER_MARKER);
            let reportOnly = (cutIdx !== -1 ? full.slice(0, cutIdx) : full).trim();
            reportOnly = reportOnly.replace(/[\s\-─━]{3,}\s*$/, '').trim();

            navigator.clipboard.writeText(reportOnly).then(() => {
              btn.textContent      = '✅ Copied!';
              btn.style.background = '#004d1a';
              btn.style.color      = '#ffffff';
              btn.style.border     = '1.5px solid #004d1a';
              setTimeout(() => {
                btn.textContent      = 'Copy Report';
                btn.style.background = '#ffffff';
                btn.style.color      = '#002855';
                btn.style.border     = '1.5px solid #002855';
              }, 2500);
            }).catch(() => {
              btn.textContent = '⚠️ Copy failed — select text manually';
              setTimeout(() => { btn.textContent = 'Copy Report'; }, 3000);
            });
          });

          msg.appendChild(btn);
        });
      });

      observer.observe(chatContainer, { childList: true, subtree: true });
    });
  </script>

</body>
</html>
